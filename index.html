<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>driftwood</title>
  <meta name="description" content="driftwood - agentic continual learning lab" />
  <link rel="icon" href="data:," />
  <style>
    @font-face {
      font-family: "Nasalization";
      src: url("./assets/fonts/nasalization-rg.woff2") format("woff2");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      color-scheme: dark;
      --paper: #030303;
      --paper-warm: #100d0a;
      --ink: #f3efe4;
      --ink-soft: rgba(243, 239, 228, 0.84);
      --rim: #79a7d7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
      font-family: Inter, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    body {
      min-height: 100vh;
    }

    body::before,
    body::after {
      position: fixed;
      inset: 0;
      content: "";
      pointer-events: none;
    }

    body::before {
      z-index: 0;
      background:
        radial-gradient(circle at 50% 47%, rgba(28, 43, 54, 0.58) 0 15%, rgba(8, 9, 10, 0.86) 48%, rgba(0, 0, 0, 0.99) 78%),
        radial-gradient(circle at 47% 35%, rgba(95, 68, 42, 0.22), transparent 40%),
        linear-gradient(120deg, #000 0%, var(--paper-warm) 48%, #020202 100%);
    }

    body::after {
      z-index: 5;
      opacity: 0.13;
      mix-blend-mode: screen;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.25) 0 0.5px, transparent 0.7px),
        radial-gradient(circle at 72% 62%, rgba(255, 255, 255, 0.16) 0 0.45px, transparent 0.65px);
      background-size: 100% 6px, 7px 100%, 37px 41px, 53px 47px;
    }

    .stage {
      position: relative;
      z-index: 1;
      width: 100vw;
      height: 100svh;
      min-height: 620px;
      isolation: isolate;
      cursor: grab;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .stage.is-dragging {
      cursor: grabbing;
    }

    .poster-back,
    .poster-overlay {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .poster-back {
      z-index: 1;
    }

    .poster-back::before {
      position: absolute;
      inset: 5.4vh 5.8vw 5.8vh;
      content: "";
      border: 2px solid rgba(225, 236, 235, 0.34);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.018), transparent 28%, transparent 72%, rgba(255, 255, 255, 0.012)),
        radial-gradient(circle at 50% 47%, transparent 0 43%, rgba(0, 0, 0, 0.34) 73%);
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.72),
        inset 0 0 0 12px rgba(255, 255, 255, 0.016),
        inset 0 0 120px rgba(0, 0, 0, 0.46),
        0 0 0 1px rgba(243, 238, 219, 0.08),
        0 42px 110px rgba(0, 0, 0, 0.62);
    }

    .poster-back::after {
      position: absolute;
      inset: clamp(18px, 2.6vw, 42px);
      content: "";
      border: 1px solid rgba(239, 233, 211, 0.16);
      box-shadow:
        inset 0 0 0 1px rgba(0, 0, 0, 0.76),
        inset 0 0 80px rgba(0, 0, 0, 0.34);
    }

    .poster-plane,
    .poster-block,
    .paper-rip {
      position: absolute;
      display: block;
    }

    .poster-plane {
      background: linear-gradient(120deg, rgba(5, 10, 13, 0.92), rgba(15, 28, 33, 0.4));
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.54);
      opacity: 0.8;
      transform-origin: center;
    }

    .poster-plane.is-left {
      left: -8vw;
      top: 22vh;
      width: 34vw;
      height: 58vh;
      transform: rotate(-12deg) skewY(-5deg);
      clip-path: polygon(0 9%, 83% 0, 100% 78%, 14% 100%);
    }

    .poster-plane.is-right {
      right: -11vw;
      top: 15vh;
      width: 42vw;
      height: 68vh;
      background: linear-gradient(145deg, rgba(8, 18, 23, 0.84), rgba(42, 54, 54, 0.22));
      transform: rotate(8deg) skewY(5deg);
      clip-path: polygon(12% 0, 100% 12%, 82% 100%, 0 80%);
    }

    .poster-block {
      right: clamp(34px, 9vw, 150px);
      bottom: clamp(86px, 12vh, 140px);
      width: min(19vw, 260px);
      height: min(17vw, 220px);
      background:
        linear-gradient(135deg, rgba(163, 69, 34, 0.42), rgba(76, 32, 24, 0.12)),
        linear-gradient(180deg, rgba(255, 215, 156, 0.08), transparent);
      border: 1px solid rgba(236, 153, 89, 0.15);
      clip-path: polygon(0 16%, 88% 0, 100% 78%, 14% 100%);
      filter: blur(0.2px);
      mix-blend-mode: screen;
      opacity: 0.42;
    }

    .paper-rip {
      left: clamp(18px, 4.8vw, 76px);
      top: 13vh;
      width: clamp(16px, 2.6vw, 34px);
      height: 74vh;
      opacity: 0.18;
      background:
        linear-gradient(90deg, transparent, rgba(244, 238, 219, 0.26) 43%, rgba(244, 238, 219, 0.08) 100%);
      clip-path: polygon(44% 0, 70% 6%, 48% 13%, 62% 21%, 38% 32%, 64% 44%, 43% 56%, 72% 66%, 46% 75%, 59% 86%, 37% 100%, 0 100%, 0 0);
      mix-blend-mode: screen;
    }

    .poster-overlay {
      z-index: 3;
      opacity: 0.76;
      mix-blend-mode: screen;
    }

    .poster-overlay::before,
    .poster-overlay::after {
      position: absolute;
      content: "";
      pointer-events: none;
    }

    .poster-overlay::before {
      inset: 7vh 7vw 7vh;
      opacity: 0.3;
      border: 1px solid rgba(232, 238, 224, 0.18);
      box-shadow:
        inset 0 0 0 10px rgba(255, 255, 255, 0.012),
        0 0 42px rgba(99, 139, 171, 0.06);
    }

    .poster-overlay::after {
      inset: 0;
      opacity: 0.36;
      background:
        linear-gradient(90deg, transparent 5.8vw, rgba(242, 238, 220, 0.5) 5.8vw calc(5.8vw + 2px), transparent calc(5.8vw + 2px)),
        linear-gradient(90deg, transparent calc(100vw - 5.8vw), rgba(242, 238, 220, 0.42) calc(100vw - 5.8vw) calc(100vw - 5.8vw + 2px), transparent calc(100vw - 5.8vw + 2px)),
        linear-gradient(180deg, transparent 5.4vh, rgba(242, 238, 220, 0.48) 5.4vh calc(5.4vh + 2px), transparent calc(5.4vh + 2px)),
        linear-gradient(180deg, transparent 94.2vh, rgba(242, 238, 220, 0.38) 94.2vh calc(94.2vh + 2px), transparent calc(94.2vh + 2px));
    }

    .crop {
      position: absolute;
      width: clamp(34px, 4.8vw, 72px);
      height: clamp(34px, 4.8vw, 72px);
      opacity: 0.72;
    }

    .crop::before,
    .crop::after {
      position: absolute;
      content: "";
      background: rgba(241, 236, 218, 0.84);
      box-shadow: 0 0 18px rgba(92, 139, 168, 0.24);
    }

    .crop::before {
      width: 100%;
      height: 2px;
      top: 0;
      left: 0;
    }

    .crop::after {
      width: 2px;
      height: 100%;
      top: 0;
      left: 0;
    }

    .crop.is-tr {
      top: 5.4vh;
      right: 5.8vw;
      transform: scaleX(-1);
    }

    .crop.is-bl {
      left: 5.8vw;
      bottom: 5.8vh;
      transform: scaleY(-1);
    }

    .crop.is-br {
      right: 5.8vw;
      bottom: 5.8vh;
      transform: scale(-1);
    }

    .hairline {
      position: absolute;
      display: block;
      background: rgba(230, 236, 226, 0.38);
      opacity: 0.66;
    }

    .hairline.is-horizontal {
      left: 7vw;
      right: 7vw;
      top: 34.5vh;
      height: 1px;
      transform: translateY(-50%);
    }

    .hairline.is-vertical {
      top: 6vh;
      bottom: 6vh;
      left: 50%;
      width: 1px;
      transform: translateX(-50%);
      opacity: 0.18;
    }

    .wordmark {
      position: absolute;
      z-index: 4;
      top: clamp(72px, 8.6vh, 100px);
      left: 50%;
      width: min(94vw, 1500px);
      margin: 0;
      transform: translateX(-50%);
      color: #f2eee1;
      font-family: Nasalization, "Trebuchet MS", "Helvetica Neue", Arial, sans-serif;
      font-size: clamp(3.4rem, 11vw, 10rem);
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.01em;
      text-align: center;
      text-transform: lowercase;
      white-space: nowrap;
      filter:
        drop-shadow(0 1px 0 rgba(255, 255, 255, 0.05))
        drop-shadow(0 22px 28px rgba(0, 0, 0, 0.82));
      pointer-events: none;
    }

    .globe-shell {
      position: absolute;
      z-index: 2;
      inset: 0;
    }

    .globe-shell canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .globe-shadow {
      position: absolute;
      z-index: 1;
      left: 50%;
      top: 78%;
      width: min(64vw, 820px);
      height: min(13vw, 132px);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0, 0, 0, 0.82) 0 22%, rgba(0, 0, 0, 0.32) 54%, transparent 73%);
      filter: blur(18px);
      opacity: 0.86;
    }

    .contact {
      position: absolute;
      z-index: 4;
      left: 50%;
      bottom: clamp(42px, 5.4vw, 78px);
      display: flex;
      align-items: center;
      gap: clamp(12px, 1.5vw, 24px);
      transform: translateX(-50%);
      font-family: "SF Mono", "IBM Plex Mono", "Roboto Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: clamp(0.68rem, 1.05vw, 0.9rem);
      font-weight: 560;
      letter-spacing: clamp(0.12em, 0.85vw, 0.24em);
      line-height: 1.35;
      text-transform: lowercase;
      white-space: nowrap;
    }

    .contact a {
      color: var(--ink-soft);
      text-decoration: none;
      padding: 6px 1px 4px;
      border-bottom: 1px solid rgba(243, 239, 228, 0.22);
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.96), 0 0 28px rgba(96, 137, 174, 0.18);
      cursor: pointer;
      transition: color 0.22s ease, border-color 0.22s ease, text-shadow 0.22s ease;
    }

    .contact a:hover,
    .contact a:focus-visible {
      color: #fff;
      border-color: rgba(121, 167, 215, 0.85);
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.96), 0 0 26px rgba(121, 167, 215, 0.55);
      outline: none;
    }

    .contact .divider {
      color: rgba(243, 239, 228, 0.34);
      pointer-events: none;
    }

    .feed-indicator {
      position: absolute;
      z-index: 4;
      right: clamp(46px, 11.6vw, 168px);
      bottom: clamp(35px, 4.9vw, 70px);
      width: clamp(5px, 0.58vw, 8px);
      height: clamp(5px, 0.58vw, 8px);
      border-radius: 50%;
      background: #ff3b2f;
      box-shadow:
        0 0 0 1px rgba(255, 102, 86, 0.34),
        0 0 18px rgba(255, 41, 32, 0.36),
        0 0 42px rgba(255, 41, 32, 0.12);
      opacity: 0.62;
      pointer-events: none;
      animation: feedPulse 2.7s cubic-bezier(0.45, 0, 0.2, 1) infinite;
    }

    .feed-indicator::before {
      position: absolute;
      inset: -7px;
      content: "";
      border: 1px solid rgba(255, 75, 58, 0.13);
      border-radius: 50%;
      opacity: 0.52;
    }

    @keyframes feedPulse {
      0%,
      58%,
      100% {
        opacity: 0.42;
        transform: scale(0.92);
        box-shadow:
          0 0 0 1px rgba(255, 102, 86, 0.22),
          0 0 12px rgba(255, 41, 32, 0.18),
          0 0 32px rgba(255, 41, 32, 0.08);
      }

      12%,
      28% {
        opacity: 0.86;
        transform: scale(1);
        box-shadow:
          0 0 0 1px rgba(255, 128, 108, 0.42),
          0 0 22px rgba(255, 48, 36, 0.54),
          0 0 52px rgba(255, 48, 36, 0.18);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .feed-indicator {
        animation: none;
        opacity: 0.58;
        transform: none;
        box-shadow:
          0 0 0 1px rgba(255, 102, 86, 0.24),
          0 0 14px rgba(255, 41, 32, 0.2);
      }
    }

    .vignette {
      position: fixed;
      z-index: 3;
      inset: -1px;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(0, 0, 0, 0.9), transparent 14%, transparent 86%, rgba(0, 0, 0, 0.9)),
        linear-gradient(180deg, rgba(0, 0, 0, 0.78), transparent 27%, transparent 72%, rgba(0, 0, 0, 0.86));
      mix-blend-mode: multiply;
    }

    @media (max-width: 760px) {
      .stage {
        min-height: 560px;
      }

      .wordmark {
        top: clamp(74px, 10.5vh, 96px);
        width: 94vw;
        font-size: clamp(2.4rem, 10.8vw, 4.1rem);
        letter-spacing: 0.008em;
      }

      .globe-shadow {
        width: 96vw;
        height: 24vw;
        top: 74%;
      }

      .contact {
        bottom: clamp(68px, 15vw, 108px);
        gap: clamp(10px, 2.6vw, 16px);
        font-size: clamp(0.62rem, 2.2vw, 0.8rem);
        letter-spacing: clamp(0.08em, 1.1vw, 0.16em);
      }

      .feed-indicator {
        right: 6vw;
        bottom: clamp(66px, 14.4vw, 104px);
        width: 6px;
        height: 6px;
      }

      .poster-back::before {
        inset: 7.4vh 4.4vw 6.3vh;
      }

      .poster-plane.is-left {
        left: -38vw;
        top: 20vh;
        width: 72vw;
        height: 56vh;
      }

      .poster-plane.is-right {
        right: -34vw;
        top: 17vh;
        width: 76vw;
        height: 62vh;
      }

      .poster-block {
        right: -10vw;
        bottom: 18vh;
        width: 42vw;
        height: 35vw;
        opacity: 0.32;
      }

      .paper-rip {
        left: 4vw;
        top: 18vh;
        height: 58vh;
        opacity: 0.14;
      }

      .poster-overlay::before {
        inset: 9.2vh 5.2vw 7.4vh;
      }

      .poster-overlay::after {
        opacity: 0.32;
        background:
          linear-gradient(90deg, transparent 5.5vw, rgba(242, 238, 220, 0.36) 5.5vw calc(5.5vw + 2px), transparent calc(5.5vw + 2px)),
          linear-gradient(90deg, transparent 94.5vw, rgba(242, 238, 220, 0.28) 94.5vw calc(94.5vw + 2px), transparent calc(94.5vw + 2px)),
          linear-gradient(180deg, transparent 13vh, rgba(242, 238, 220, 0.32) 13vh calc(13vh + 2px), transparent calc(13vh + 2px)),
          linear-gradient(180deg, transparent 88vh, rgba(242, 238, 220, 0.28) 88vh calc(88vh + 2px), transparent calc(88vh + 2px));
      }

      .crop {
        width: 38px;
        height: 38px;
        opacity: 0.58;
      }

      .crop.is-tr {
        top: 13vh;
        right: 6vw;
      }

      .crop.is-bl {
        left: 6vw;
        bottom: 7.2vh;
      }

      .crop.is-br {
        right: 6vw;
        bottom: 7.2vh;
      }

      .hairline.is-horizontal {
        top: 28vh;
        left: 0;
        right: 0;
        opacity: 0.26;
      }

      .hairline.is-vertical {
        left: 8vw;
        opacity: 0.12;
      }
    }

    @media (max-width: 420px) {
      .wordmark {
        font-size: clamp(2.1rem, 10.4vw, 3.4rem);
        letter-spacing: 0;
      }
    }
  </style>

<body>
  <main class="stage" aria-label="driftwood agentic continual learning lab">
    <div class="poster-back" aria-hidden="true">
      <span class="poster-plane is-left"></span>
      <span class="poster-plane is-right"></span>
      <span class="poster-block"></span>
      <span class="paper-rip"></span>
    </div>
    <h1 class="wordmark">driftwood</h1>
    <div class="globe-shell" id="globe" aria-hidden="true"></div>
    <div class="globe-shadow" aria-hidden="true"></div>
    <div class="poster-overlay" aria-hidden="true">
      <span class="crop is-tr"></span>
      <span class="crop is-bl"></span>
      <span class="crop is-br"></span>
      <span class="hairline is-horizontal"></span>
      <span class="hairline is-vertical"></span>
    </div>
    <span class="feed-indicator" aria-hidden="true"></span>
    <nav class="contact" aria-label="contact">
      <a href="mailto:aayush@driftwood.sh">aayush@driftwood.sh</a>
      <span class="divider" aria-hidden="true">/</span>
      <a href="https://www.linkedin.com/in/aayushgupta04/" target="_blank" rel="noopener">linkedin</a>
    </nav>
    <div class="vignette" aria-hidden="true"></div>
  </main>

  <script type="module">
    import * as THREE from "./assets/vendor/three.module.js";

    const stage = document.querySelector(".stage");
    const globeMount = document.querySelector("#globe");
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const assetBase = "./assets/nasa/";

    const renderer = new THREE.WebGLRenderer({
      alpha: true,
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setClearColor(0x000000, 0);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    let renderPixelRatio = Math.min(window.devicePixelRatio || 1, 3);
    renderer.setPixelRatio(renderPixelRatio);
    globeMount.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(28, 1, 0.1, 240);
    const cameraRig = new THREE.Group();
    const pitchRig = new THREE.Group();
    camera.position.set(0, 0, 11.7);
    camera.lookAt(0, 0, 0);
    pitchRig.add(camera);
    cameraRig.add(pitchRig);
    scene.add(cameraRig);

    const textureLoader = new THREE.TextureLoader();
    textureLoader.setCrossOrigin("anonymous");

    const loadTexture = (name) => new Promise((resolve, reject) => {
      textureLoader.load(`${assetBase}${name}`, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        texture.wrapS = THREE.RepeatWrapping;
        texture.wrapT = THREE.ClampToEdgeWrapping;
        resolve(texture);
      }, undefined, reject);
    });

    const loadTextureFallback = async (names) => {
      let lastError;
      for (const name of names) {
        try {
          return await loadTexture(name);
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError;
    };

    const makeCloudMask = async (withCloudsUrl, noCloudsUrl) => {
      const [withClouds, noClouds] = await Promise.all([
        loadImage(`${assetBase}${withCloudsUrl}`),
        loadImage(`${assetBase}${noCloudsUrl}`)
      ]);

      const width = Math.min(withClouds.naturalWidth, noClouds.naturalWidth);
      const height = Math.min(withClouds.naturalHeight, noClouds.naturalHeight);
      const canvas = document.createElement("canvas");
      const compare = document.createElement("canvas");
      canvas.width = compare.width = width;
      canvas.height = compare.height = height;

      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const compareCtx = compare.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(withClouds, 0, 0, width, height);
      compareCtx.drawImage(noClouds, 0, 0, width, height);

      const cloudData = ctx.getImageData(0, 0, width, height);
      const baseData = compareCtx.getImageData(0, 0, width, height).data;
      const pixels = cloudData.data;

      for (let index = 0; index < pixels.length; index += 4) {
        const cloudLuma = pixels[index] * 0.2126 + pixels[index + 1] * 0.7152 + pixels[index + 2] * 0.0722;
        const baseLuma = baseData[index] * 0.2126 + baseData[index + 1] * 0.7152 + baseData[index + 2] * 0.0722;
        const diff = Math.max(0, cloudLuma - baseLuma);
        const whiteness = 255 - (Math.max(pixels[index], pixels[index + 1], pixels[index + 2]) - Math.min(pixels[index], pixels[index + 1], pixels[index + 2]));
        const alpha = THREE.MathUtils.clamp((diff * 2.2 + Math.max(0, whiteness - 216) * 0.42) / 255, 0, 0.86);

        pixels[index] = 232;
        pixels[index + 1] = 238;
        pixels[index + 2] = 240;
        pixels[index + 3] = Math.round(alpha * 255);
      }

      ctx.putImageData(cloudData, 0, 0);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      return texture;
    };

    const loadImage = (src) => new Promise((resolve, reject) => {
      const image = new Image();
      image.onload = () => resolve(image);
      image.onerror = reject;
      image.src = src;
    });

    const date = new Date();
    const localLongitude = -date.getTimezoneOffset() / 4;
    const localHour = date.getHours() + date.getMinutes() / 60;
    const yearStart = new Date(date.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((date - yearStart) / 86400000);
    const declination = THREE.MathUtils.degToRad(23.44 * Math.sin(THREE.MathUtils.degToRad((360 / 365) * (dayOfYear - 81))));
    const utcHour = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
    const subsolarLongitude = THREE.MathUtils.degToRad(-15 * (utcHour - 12));
    const sunDirection = new THREE.Vector3(
      Math.cos(declination) * Math.cos(subsolarLongitude),
      Math.sin(declination),
      -Math.cos(declination) * Math.sin(subsolarLongitude)
    ).normalize();

    const highResolutionTextures = renderer.capabilities.maxTextureSize >= 8192;
    const loadCloudTexture = async () => {
      if (highResolutionTextures) {
        try {
          return await loadTexture("earth-clouds-alpha-8192.png");
        } catch {
          // Fall back to the derived 2K cloud mask if the deployed high-res alpha map is unavailable.
        }
      }
      return makeCloudMask("earth-with-clouds-2048.jpg", "earth-no-clouds-2048.jpg");
    };
    const [dayMap, nightMap, cloudMap, specularMap] = await Promise.all([
      loadTextureFallback(highResolutionTextures
        ? ["earth-topography-8192.jpg", "earth-no-clouds-2048.jpg"]
        : ["earth-no-clouds-2048.jpg"]),
      loadTextureFallback(highResolutionTextures
        ? ["black-marble-2016-8192.jpg", "black-marble-2016-3600.jpg"]
        : ["black-marble-2016-3600.jpg"]),
      loadCloudTexture(),
      loadTextureFallback(highResolutionTextures
        ? ["earth-specular-8192.jpg", "earth-no-clouds-2048.jpg"]
        : ["earth-no-clouds-2048.jpg"])
    ]);

    const globeUniforms = {
      dayMap: { value: dayMap },
      nightMap: { value: nightMap },
      specularMap: { value: specularMap },
      sunDirection: { value: sunDirection },
      time: { value: 0 }
    };

    const globeMaterial = new THREE.ShaderMaterial({
      uniforms: globeUniforms,
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormalWorld;
        varying vec3 vViewDirection;

        void main() {
          vUv = uv;
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vNormalWorld = normalize(mat3(modelMatrix) * normal);
          vViewDirection = normalize(cameraPosition - worldPosition.xyz);
          gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
      `,
      fragmentShader: `
        uniform sampler2D dayMap;
        uniform sampler2D nightMap;
        uniform sampler2D specularMap;
        uniform vec3 sunDirection;
        uniform float time;

        varying vec2 vUv;
        varying vec3 vNormalWorld;
        varying vec3 vViewDirection;

        void main() {
          vec3 normalWorld = normalize(vNormalWorld);
          float sunlight = dot(normalWorld, normalize(sunDirection));
          float daySide = smoothstep(-0.12, 0.34, sunlight);
          float nightSide = 1.0 - smoothstep(-0.26, -0.08, sunlight);
          float cityMask = 1.0 - smoothstep(-0.24, -0.075, sunlight);
          float terminator = smoothstep(-0.18, 0.08, sunlight) * (1.0 - smoothstep(0.1, 0.42, sunlight));
          float warmEdge = smoothstep(-0.1, 0.04, sunlight) * (1.0 - smoothstep(0.04, 0.22, sunlight));
          float violetEdge = smoothstep(-0.24, -0.08, sunlight) * (1.0 - smoothstep(-0.06, 0.12, sunlight));
          float rim = pow(1.0 - max(dot(normalWorld, normalize(vViewDirection)), 0.0), 2.2);

          vec2 uv = vUv;
          vec3 dayColor = texture2D(dayMap, uv).rgb;
          vec3 nightColor = texture2D(nightMap, uv).rgb;
          float waterMask = texture2D(specularMap, uv).r;
          float cityLight = smoothstep(0.055, 0.72, max(max(nightColor.r, nightColor.g), nightColor.b));

          // Brighten and slightly boost contrast
          dayColor = pow(dayColor, vec3(0.85)); 
          dayColor = clamp((dayColor - 0.5) * 1.1 + 0.5, 0.0, 1.0);
          // Cool down the shadows and midtones slightly, keep highlights natural
          dayColor = mix(dayColor, dayColor * vec3(0.85, 0.95, 1.15), 0.5);
          dayColor += vec3(0.02, 0.05, 0.1) * (0.5 + rim * 0.8);
          nightColor = pow(nightColor, vec3(0.54)) * vec3(3.06, 2.08, 1.12);

          vec3 reflectedSun = reflect(-normalize(sunDirection), normalWorld);
          float oceanGlint = pow(max(dot(reflectedSun, normalize(vViewDirection)), 0.0), 36.0) * waterMask * daySide;

          vec3 nightBody = vec3(0.012, 0.027, 0.049) * (0.98 + rim * 0.5);
          vec3 cityColor = nightColor * cityLight * cityMask * (1.16 + cityLight * 0.92);
          vec3 color = mix(nightBody, dayColor, daySide * 0.95);
          color += cityColor;
          color += oceanGlint * vec3(0.32, 0.5, 0.68);
          color += terminator * vec3(0.08, 0.2, 0.34) * (0.55 + nightSide * 0.36);
          color += warmEdge * vec3(0.34, 0.16, 0.055) * 0.32;
          color += violetEdge * vec3(0.12, 0.07, 0.2) * 0.22;
          color += rim * vec3(0.2, 0.42, 0.72) * (0.9 + daySide * 0.16);
          color *= 0.76 + smoothstep(-0.72, 0.82, normalWorld.y) * 0.22;

          float limb = smoothstep(0.04, 0.18, dot(normalWorld, normalize(vViewDirection)));
          gl_FragColor = vec4(color * limb, 1.0);
        }
      `
    });

    const cloudUniforms = {
      cloudMap: { value: cloudMap },
      sunDirection: { value: sunDirection },
      time: { value: 0 }
    };

    const cloudMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.NormalBlending,
      uniforms: cloudUniforms,
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vNormalWorld;
        varying vec3 vViewDirection;

        void main() {
          vUv = uv;
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vNormalWorld = normalize(mat3(modelMatrix) * normal);
          vViewDirection = normalize(cameraPosition - worldPosition.xyz);
          gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
      `,
      fragmentShader: `
        uniform sampler2D cloudMap;
        uniform vec3 sunDirection;
        uniform float time;

        varying vec2 vUv;
        varying vec3 vNormalWorld;
        varying vec3 vViewDirection;

        void main() {
          vec2 wind = vec2(time * 0.00045, 0.0);
          vec4 cloud = texture2D(cloudMap, vUv + wind);
          float sunlight = dot(normalize(vNormalWorld), normalize(sunDirection));
          float daySide = smoothstep(-0.18, 0.28, sunlight);
          float rim = pow(1.0 - max(dot(normalize(vNormalWorld), normalize(vViewDirection)), 0.0), 2.1);
          float cloudCoverage = max(cloud.a, smoothstep(0.18, 0.78, cloud.r) * 0.72);
          float alpha = cloudCoverage * (0.035 + daySide * 0.16 + rim * 0.12);
          vec3 color = mix(vec3(0.14, 0.22, 0.28), vec3(0.68, 0.73, 0.72), daySide);
          gl_FragColor = vec4(color, alpha);
        }
      `
    });

    const atmosphereMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      uniforms: {
        sunDirection: { value: sunDirection }
      },
      vertexShader: `
        varying vec3 vNormalWorld;
        varying vec3 vViewDirection;

        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vNormalWorld = normalize(mat3(modelMatrix) * normal);
          vViewDirection = normalize(cameraPosition - worldPosition.xyz);
          gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
      `,
      fragmentShader: `
        uniform vec3 sunDirection;
        varying vec3 vNormalWorld;
        varying vec3 vViewDirection;

        void main() {
          float fresnel = pow(1.0 - max(dot(normalize(vNormalWorld), normalize(vViewDirection)), 0.0), 2.42);
          float sun = smoothstep(-0.35, 0.65, dot(normalize(vNormalWorld), normalize(sunDirection)));
          gl_FragColor = vec4(vec3(0.26, 0.56, 0.86) * fresnel * (0.58 + sun * 0.5), fresnel * 0.6);
        }
      `
    });

    const globe = new THREE.Mesh(new THREE.SphereGeometry(2.52, 256, 128), globeMaterial);
    const clouds = new THREE.Mesh(new THREE.SphereGeometry(2.565, 256, 128), cloudMaterial);
    const atmosphere = new THREE.Mesh(new THREE.SphereGeometry(2.72, 256, 128), atmosphereMaterial);
    const group = new THREE.Group();
    group.add(atmosphere, globe, clouds);
    scene.add(group);

    // --- Cinematic starfield ---
    const starGroup = new THREE.Group();
    const starPalette = [
      [0.62, 0.73, 1.0],   // hot blue-white
      [0.9, 0.94, 1.0],    // white
      [1.0, 0.96, 0.85],   // pale gold
      [1.0, 0.82, 0.58]    // amber giant
    ];
    // The 28-degree fov only sees ~3% of the sky shell at a time, so the
    // count needs to be high for a convincingly dense field in-frame.
    const starCount = 6500;
    const starPosition = new Float32Array(starCount * 3);
    const starTint = new Float32Array(starCount * 3);
    const starSize = new Float32Array(starCount);
    const starPhase = new Float32Array(starCount);

    for (let i = 0; i < starCount; i += 1) {
      const radius = 44 + Math.pow(Math.random(), 0.62) * 38;
      const y = Math.random() * 2 - 1;
      const theta = Math.random() * Math.PI * 2;
      const horizontal = Math.sqrt(Math.max(0, 1 - y * y));
      starPosition[i * 3] = radius * horizontal * Math.cos(theta);
      starPosition[i * 3 + 1] = radius * y;
      starPosition[i * 3 + 2] = radius * horizontal * Math.sin(theta);

      // Bias heavily toward cool colors; warm stars stay rare.
      const palette = starPalette[Math.floor(Math.pow(Math.random(), 1.7) * starPalette.length)];
      const brightness = 0.55 + Math.pow(Math.random(), 2.0) * 0.45;
      starTint[i * 3] = palette[0] * brightness;
      starTint[i * 3 + 1] = palette[1] * brightness;
      starTint[i * 3 + 2] = palette[2] * brightness;

      const hero = Math.random() < 0.05;
      starSize[i] = hero ? 3.4 + Math.random() * 2.2 : 1.1 + Math.random() * 1.7;
      starPhase[i] = Math.random() * Math.PI * 2;
    }

    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute("position", new THREE.BufferAttribute(starPosition, 3));
    starGeometry.setAttribute("tint", new THREE.BufferAttribute(starTint, 3));
    starGeometry.setAttribute("size", new THREE.BufferAttribute(starSize, 1));
    starGeometry.setAttribute("phase", new THREE.BufferAttribute(starPhase, 1));

    const starUniforms = {
      time: { value: 0 },
      pixelRatio: { value: renderPixelRatio }
    };

    const starMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: starUniforms,
      vertexShader: `
        attribute float size;
        attribute float phase;
        attribute vec3 tint;
        uniform float time;
        uniform float pixelRatio;
        varying vec3 vTint;
        varying float vTwinkle;

        void main() {
          vTint = tint;
          float speed = 0.55 + fract(phase * 0.3183) * 1.9;
          vTwinkle = 0.74 + 0.26 * sin(time * speed + phase * 7.0);
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = size * pixelRatio * clamp(190.0 / -mvPosition.z, 0.5, 6.0);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vTint;
        varying float vTwinkle;

        void main() {
          vec2 offset = gl_PointCoord - vec2(0.5);
          float dist = length(offset);
          float halo = smoothstep(0.5, 0.04, dist);
          float core = smoothstep(0.2, 0.0, dist);
          float alpha = (halo * halo * 0.85 + core) * vTwinkle;
          if (alpha < 0.004) discard;
          gl_FragColor = vec4(vTint * (0.6 + core * 0.9), alpha);
        }
      `
    });

    starGroup.add(new THREE.Points(starGeometry, starMaterial));
    scene.add(starGroup);

    // --- Satellites with glow sprites, fading trails, and faint orbit rings ---
    const makeGlowTexture = () => {
      const size = 96;
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      gradient.addColorStop(0, "rgba(255, 255, 255, 1)");
      gradient.addColorStop(0.16, "rgba(222, 236, 255, 0.92)");
      gradient.addColorStop(0.4, "rgba(132, 176, 232, 0.3)");
      gradient.addColorStop(1, "rgba(70, 110, 180, 0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    };

    const glowTexture = makeGlowTexture();
    const TRAIL_SEGMENTS = 72;
    const satelliteConfigs = [
      { radius: 3.18, inclination: 1.12, node: 0.7, speed: 0.21, phase: 0.6, scale: 0.17, color: 0xbfd9ff, trailSpan: 1.1, trailStrength: 1.0, blink: 1.4 },
      { radius: 3.52, inclination: 0.42, node: 2.4, speed: -0.146, phase: 2.8, scale: 0.14, color: 0xd8e6ff, trailSpan: 0.95, trailStrength: 0.8, blink: 0.9 },
      { radius: 3.86, inclination: 1.78, node: 4.2, speed: 0.105, phase: 4.4, scale: 0.13, color: 0xffe2bc, trailSpan: 0.85, trailStrength: 0.7, blink: 1.9 },
      { radius: 4.28, inclination: 0.86, node: 5.4, speed: -0.082, phase: 1.7, scale: 0.115, color: 0xcfe2ff, trailSpan: 0.75, trailStrength: 0.6, blink: 1.1 }
    ];

    const satelliteGroup = new THREE.Group();
    const satellites = satelliteConfigs.map((config) => {
      const orbit = new THREE.Group();
      orbit.rotation.set(config.inclination, config.node, 0);

      const ringSegments = 160;
      const ringPositions = new Float32Array((ringSegments + 1) * 3);
      for (let j = 0; j <= ringSegments; j += 1) {
        const angle = (j / ringSegments) * Math.PI * 2;
        ringPositions[j * 3] = Math.cos(angle) * config.radius;
        ringPositions[j * 3 + 1] = 0;
        ringPositions[j * 3 + 2] = Math.sin(angle) * config.radius;
      }
      const ringGeometry = new THREE.BufferGeometry();
      ringGeometry.setAttribute("position", new THREE.BufferAttribute(ringPositions, 3));
      const ring = new THREE.Line(ringGeometry, new THREE.LineBasicMaterial({
        color: 0x96b4dc,
        transparent: true,
        opacity: 0.05,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      }));

      const trailPositions = new Float32Array(TRAIL_SEGMENTS * 3);
      const trailColors = new Float32Array(TRAIL_SEGMENTS * 3);
      const headColor = new THREE.Color(config.color);
      for (let j = 0; j < TRAIL_SEGMENTS; j += 1) {
        const fade = Math.pow(1 - j / (TRAIL_SEGMENTS - 1), 2.2) * config.trailStrength;
        trailColors[j * 3] = headColor.r * fade;
        trailColors[j * 3 + 1] = headColor.g * fade;
        trailColors[j * 3 + 2] = headColor.b * fade;
      }
      const trailGeometry = new THREE.BufferGeometry();
      trailGeometry.setAttribute("position", new THREE.BufferAttribute(trailPositions, 3));
      trailGeometry.setAttribute("color", new THREE.BufferAttribute(trailColors, 3));
      const trail = new THREE.Line(trailGeometry, new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      }));
      trail.frustumCulled = false;

      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: glowTexture,
        color: config.color,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      }));
      sprite.scale.setScalar(config.scale);

      orbit.add(ring, trail, sprite);
      satelliteGroup.add(orbit);
      return { ...config, sprite, trail, trailPositions };
    });
    scene.add(satelliteGroup);

    const satelliteWorldPosition = new THREE.Vector3();
    const updateSatellites = (time) => {
      for (const sat of satellites) {
        const angle = sat.phase + time * sat.speed;
        sat.sprite.position.set(Math.cos(angle) * sat.radius, 0, Math.sin(angle) * sat.radius);

        const direction = Math.sign(sat.speed) || 1;
        for (let j = 0; j < TRAIL_SEGMENTS; j += 1) {
          const trailAngle = angle - direction * (j / (TRAIL_SEGMENTS - 1)) * sat.trailSpan;
          sat.trailPositions[j * 3] = Math.cos(trailAngle) * sat.radius;
          sat.trailPositions[j * 3 + 1] = 0;
          sat.trailPositions[j * 3 + 2] = Math.sin(trailAngle) * sat.radius;
        }
        sat.trail.geometry.attributes.position.needsUpdate = true;

        // Sunlit satellites glint brighter; shadowed ones dim to a faint beacon.
        sat.sprite.getWorldPosition(satelliteWorldPosition).normalize();
        const glint = Math.max(0, satelliteWorldPosition.dot(sunDirection));
        const beacon = 0.82 + 0.18 * Math.sin(time * sat.blink + sat.phase * 3.0);
        sat.sprite.material.opacity = (0.42 + glint * 0.58) * beacon;
      }
    };
    updateSatellites(0);

    const baseLongitude = THREE.MathUtils.degToRad(localLongitude + (localHour - 12) * 1.7);
    const baseView = {
      x: THREE.MathUtils.degToRad(-26), // pitch toward the northern hemisphere on load
      y: baseLongitude + Math.PI * 0.48,
      z: THREE.MathUtils.degToRad(-4)
    };
    const pitchBounds = {
      min: THREE.MathUtils.degToRad(-62),
      max: THREE.MathUtils.degToRad(46)
    };
    const clampOrbitPitch = (pitchOffset) => THREE.MathUtils.clamp(
      pitchOffset,
      pitchBounds.min - baseView.x,
      pitchBounds.max - baseView.x
    );
    const orbitRotation = { x: 0, y: 0 };
    const orbitTarget = { x: 0, y: 0 };
    const rotationVelocity = { x: 0, y: 0 };
    const dragState = {
      active: false,
      pointerId: null,
      lastX: 0,
      lastY: 0,
      lastTime: performance.now()
    };
    let lastInteractionAt = performance.now();
    let autoDriftY = 0;
    let autoTiltX = 0;

    group.rotation.set(0, 0, 0);
    clouds.rotation.set(0, 0, 0);
    cameraRig.rotation.set(0, baseView.y, 0);
    pitchRig.rotation.set(baseView.x, 0, 0);
    camera.rotation.z = baseView.z;

    const setDragging = (isDragging) => {
      dragState.active = isDragging;
      stage.classList.toggle("is-dragging", isDragging);
    };

    const beginDrag = (event) => {
      if (event.pointerType === "mouse" && event.button !== 0) {
        return;
      }
      if (event.target.closest?.("a")) {
        return;
      }

      event.preventDefault();
      stage.setPointerCapture?.(event.pointerId);
      dragState.pointerId = event.pointerId;
      dragState.lastX = event.clientX;
      dragState.lastY = event.clientY;
      dragState.lastTime = performance.now();
      rotationVelocity.x = 0;
      rotationVelocity.y = 0;
      lastInteractionAt = dragState.lastTime;
      setDragging(true);
    };

    const updateDrag = (event) => {
      if (!dragState.active || event.pointerId !== dragState.pointerId) {
        return;
      }

      event.preventDefault();
      const now = performance.now();
      const deltaTime = Math.max(12, now - dragState.lastTime);
      const deltaX = event.clientX - dragState.lastX;
      const deltaY = event.clientY - dragState.lastY;
      const dragScale = event.pointerType === "touch" ? 0.00325 : 0.0029;
      const nextX = clampOrbitPitch(orbitTarget.x - deltaY * dragScale);
      const appliedX = nextX - orbitTarget.x;

      orbitTarget.y -= deltaX * dragScale;
      orbitTarget.x = nextX;
      rotationVelocity.y = THREE.MathUtils.clamp((-deltaX * dragScale) / (deltaTime / 1000), -2.6, 2.6);
      rotationVelocity.x = THREE.MathUtils.clamp(appliedX / (deltaTime / 1000), -1.35, 1.35);
      dragState.lastX = event.clientX;
      dragState.lastY = event.clientY;
      dragState.lastTime = now;
      lastInteractionAt = now;
    };

    const endDrag = (event) => {
      if (!dragState.active || event.pointerId !== dragState.pointerId) {
        return;
      }

      stage.releasePointerCapture?.(event.pointerId);
      dragState.pointerId = null;
      lastInteractionAt = performance.now();
      setDragging(false);
    };

    stage.addEventListener("pointerdown", beginDrag);
    stage.addEventListener("pointermove", updateDrag);
    stage.addEventListener("pointerup", endDrag);
    stage.addEventListener("pointercancel", endDrag);
    stage.addEventListener("lostpointercapture", () => {
      dragState.pointerId = null;
      setDragging(false);
    });

    const GLOBE_RADIUS = 2.52;
    // Fraction of the old square shell the globe silhouette used to fill
    // (asin(2.52 / 11.7) projected through the 28-degree fov).
    const GLOBE_SHELL_FILL = 0.884;

    const resize = () => {
      const rect = globeMount.getBoundingClientRect();
      const width = Math.max(1, Math.floor(rect.width));
      const height = Math.max(1, Math.floor(rect.height));
      const nextPixelRatio = Math.min(window.devicePixelRatio || 1, 3);
      if (nextPixelRatio !== renderPixelRatio) {
        renderPixelRatio = nextPixelRatio;
        renderer.setPixelRatio(renderPixelRatio);
        starUniforms.pixelRatio.value = renderPixelRatio;
      }
      renderer.setSize(width, height, false);

      // The canvas now covers the whole stage; recreate the old globe-shell
      // sizing (min(72vw, 930px), 96vw on mobile) by solving for the camera
      // distance that projects the globe to the same pixel diameter.
      const isMobile = width <= 760;
      const shellSize = isMobile ? width * 0.96 : Math.max(Math.min(width * 0.72, 930), 448);
      const globeDiameterPx = shellSize * GLOBE_SHELL_FILL;
      const tanHalfFov = Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
      const apparentAngle = Math.atan((globeDiameterPx / height) * tanHalfFov);
      camera.position.z = GLOBE_RADIUS / Math.sin(Math.max(apparentAngle, 0.02));

      // Keep the globe center at 52% (51.5% mobile) of the stage height.
      const centerY = isMobile ? 0.515 : 0.52;
      camera.aspect = width / height;
      camera.setViewOffset(width, height, 0, -(centerY - 0.5) * height, width, height);
      camera.updateProjectionMatrix();
    };

    window.addEventListener("resize", resize, { passive: true });
    resize();

    // Render the live globe into a small offscreen target and publish it as the
    // favicon, so the tab icon matches what's on screen (user longitude + day/night).
    const faviconSize = 128;
    // No MSAA: the globe limb is already feathered in-shader, and a plain
    // framebuffer lets us read pixels back asynchronously without a GPU stall.
    const faviconTarget = new THREE.WebGLRenderTarget(faviconSize, faviconSize, {
      colorSpace: THREE.SRGBColorSpace,
      depthBuffer: true
    });
    const faviconCamera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
    const faviconDistance = 10.8; // frames the globe to fill the icon
    const faviconPixels = new Uint8Array(faviconSize * faviconSize * 4);
    const faviconCanvas = document.createElement("canvas");
    faviconCanvas.width = faviconCanvas.height = faviconSize;
    const faviconCtx = faviconCanvas.getContext("2d");
    const faviconImage = faviconCtx.createImageData(faviconSize, faviconSize);
    const faviconRowBytes = faviconSize * 4;
    const faviconLink = document.querySelector("link[rel='icon']") || document.createElement("link");
    faviconLink.rel = "icon";
    faviconLink.type = "image/png";
    if (!faviconLink.isConnected) document.head.appendChild(faviconLink);

    const faviconPosition = new THREE.Vector3();
    const faviconQuaternion = new THREE.Quaternion();
    const faviconGL = renderer.getContext();
    const supportsAsyncRead = renderer.capabilities.isWebGL2;
    let faviconReadPending = false;

    const publishFaviconPixels = () => {
      // WebGL reads bottom-to-top, so flip rows into the 2D canvas.
      for (let y = 0; y < faviconSize; y++) {
        const src = (faviconSize - 1 - y) * faviconRowBytes;
        faviconImage.data.set(faviconPixels.subarray(src, src + faviconRowBytes), y * faviconRowBytes);
      }
      faviconCtx.putImageData(faviconImage, 0, 0);
      faviconLink.href = faviconCanvas.toDataURL("image/png");
    };

    const updateFavicon = () => {
      if (document.hidden || faviconReadPending) return;
      camera.updateWorldMatrix(true, false);
      camera.getWorldPosition(faviconPosition);
      camera.getWorldQuaternion(faviconQuaternion);
      faviconCamera.position.copy(faviconPosition).normalize().multiplyScalar(faviconDistance);
      faviconCamera.quaternion.copy(faviconQuaternion);

      renderer.setRenderTarget(faviconTarget);
      renderer.render(scene, faviconCamera);

      if (!supportsAsyncRead) {
        renderer.readRenderTargetPixels(faviconTarget, 0, 0, faviconSize, faviconSize, faviconPixels);
        renderer.setRenderTarget(null);
        publishFaviconPixels();
        return;
      }

      // Kick the readback into a pixel-pack buffer and poll a fence instead of
      // blocking the main render pipeline (sync ReadPixels causes GPU stalls
      // that hitch the satellite/star animation).
      const gl = faviconGL;
      const pixelBuffer = gl.createBuffer();
      gl.bindBuffer(gl.PIXEL_PACK_BUFFER, pixelBuffer);
      gl.bufferData(gl.PIXEL_PACK_BUFFER, faviconPixels.byteLength, gl.STREAM_READ);
      gl.readPixels(0, 0, faviconSize, faviconSize, gl.RGBA, gl.UNSIGNED_BYTE, 0);
      const fence = gl.fenceSync(gl.SYNC_GPU_COMMANDS_COMPLETE, 0);
      gl.bindBuffer(gl.PIXEL_PACK_BUFFER, null);
      renderer.setRenderTarget(null);
      gl.flush();
      faviconReadPending = true;

      const poll = () => {
        const status = gl.clientWaitSync(fence, 0, 0);
        if (status === gl.TIMEOUT_EXPIRED) {
          setTimeout(poll, 32);
          return;
        }
        if (status !== gl.WAIT_FAILED) {
          gl.bindBuffer(gl.PIXEL_PACK_BUFFER, pixelBuffer);
          gl.getBufferSubData(gl.PIXEL_PACK_BUFFER, 0, faviconPixels);
          gl.bindBuffer(gl.PIXEL_PACK_BUFFER, null);
          publishFaviconPixels();
        }
        gl.deleteSync(fence);
        gl.deleteBuffer(pixelBuffer);
        faviconReadPending = false;
      };
      setTimeout(poll, 16);
    };

    updateFavicon();
    setInterval(updateFavicon, 2000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) updateFavicon();
    });

    const clock = new THREE.Clock();
    const animate = () => {
      const delta = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;
      const now = performance.now();
      const motion = reducedMotion ? 0 : elapsed;
      globeUniforms.time.value = motion;
      cloudUniforms.time.value = motion;
      starUniforms.time.value = motion;
      starGroup.rotation.y = motion * 0.0042;
      updateSatellites(motion);

      if (!dragState.active && !reducedMotion) {
        const damping = Math.pow(0.89, delta * 60);
        orbitTarget.y += rotationVelocity.y * delta;
        orbitTarget.x = clampOrbitPitch(orbitTarget.x + rotationVelocity.x * delta);
        rotationVelocity.y *= damping;
        rotationVelocity.x *= damping;

        if (Math.abs(rotationVelocity.y) < 0.004) rotationVelocity.y = 0;
        if (Math.abs(rotationVelocity.x) < 0.003) rotationVelocity.x = 0;
      }

      const follow = dragState.active ? 0.54 : 0.18;
      orbitRotation.y += (orbitTarget.y - orbitRotation.y) * (1.0 - Math.pow(1.0 - follow, delta * 60));
      orbitRotation.x += (orbitTarget.x - orbitRotation.x) * (1.0 - Math.pow(1.0 - follow, delta * 60));

      const idleBlend = reducedMotion ? 0 : THREE.MathUtils.smoothstep((now - lastInteractionAt) / 950, 0, 1);
      autoDriftY += delta * 0.052 * idleBlend;
      autoTiltX = Math.sin(motion * 0.11) * 0.018 * idleBlend;

      cameraRig.rotation.y = baseView.y + autoDriftY + orbitRotation.y;
      cameraRig.rotation.x = 0;
      cameraRig.rotation.z = 0;
      pitchRig.rotation.x = baseView.x + autoTiltX + orbitRotation.x;
      pitchRig.rotation.y = 0;
      pitchRig.rotation.z = 0;
      camera.rotation.z = baseView.z;
      clouds.rotation.y = 0;
      clouds.rotation.x = 0;
      clouds.rotation.z = 0;

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    };

    animate();
  </script>
</body>
</html>
